{% extends "base.html" %}

{% block content %}

<h1>Review Audit Logs</h1>

<table border="1" cellpadding="8">

<tr>
    <th>Timestamp</th>
    <th>User</th>
    <th>Event</th>
    <th>Status</th>
    <th>Message</th>
</tr>

{% for log in logs %}
<tr>
    <td>{{ log["@timestamp"] }}</td>
    <td>{{ log["username"] }}</td>
    <td>{{ log["event_type"] }}</td>
    <td>{{ log["status"] }}</td>
    <td>{{ log["message"] }}</td>
</tr>
{% endfor %}

</table>

<br>

<a href="{{ url_for('admin_dashboard') }}">
Back To Dashboard
</a>

{% endblock %}
