{% extends "base.html" %}
{% block content %}
<h1>Your Cart</h1>

{% if items %}
<table>
    <tr>
        <th>Product</th>
        <th>Price</th>
        <th>Quantity</th>
    </tr>

    {% for item in items %}
    <tr>
        <td>{{ item.product.name }}</td>
        <td>${{ item.product.price }}</td>
        <td>{{ item.quantity }}</td>
    </tr>
    {% endfor %}
</table>
{% else %}
<p>Your cart is empty.</p>
{% endif %}
{% endblock %}
