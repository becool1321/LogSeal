{% extends "base.html" %}

{% block content %}

<h1>Security Statistics</h1>

<table border="1" cellpadding="8">

<tr>
    <td>Total Alerts</td>
    <td>{{ total_alerts }}</td>
</tr>

<tr>
    <td>Critical Alerts</td>
    <td>{{ critical }}</td>
</tr>

<tr>
    <td>High Alerts</td>
    <td>{{ high }}</td>
</tr>

<tr>
    <td>Medium Alerts</td>
    <td>{{ medium }}</td>
</tr>

</table>

<br>

<a href="{{ url_for('admin_dashboard') }}">
Back to Admin Dashboard
</a>

{% endblock %}
